{% extends "base.html" %}
{% block title %}World Cup Historian{% endblock %}
{% block content %}
<div class="chat-container">
    <div class="chat-header"><h1>World Cup Historian</h1><button id="reset-btn" type="button">Reset Chat</button></div>

    <div class="chat-box" id="chat-box">
        {% for msg in history %}
            {% if msg.role == "user" %}
                <div class="chat-message user-message">{{ msg.content }}</div>
            {% else %}
                <div class="chat-message assistant-message">{{ msg.content }}</div>
            {% endif %}
        {% endfor %}
    </div>

    <p class="error" id="error-box" style="display: none;"></p>

    <form id="chat-form" class="chat-form">
        <input type="text" id="message-input" placeholder="Ask about the World Cup..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
    </form>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const errorBox = document.getElementById("error-box");
    const sendBtn = document.getElementById("send-btn");
    const resetBtn = document.getElementById("reset-btn");

    chatBox.scrollTop = chatBox.scrollHeight;

    function addMessage(role, content) {
        const div = document.createElement("div");
        div.className = "chat-message " + (role === "user" ? "user-message" : "assistant-message");
        div.textContent = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    resetBtn.addEventListener("click", async function () {
        await fetch("/worldcup/reset", { method: "POST" });
        chatBox.innerHTML = "";
        errorBox.style.display = "none";
    });

    form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        addMessage("user", message);
        input.value = "";
        sendBtn.disabled = true;
        errorBox.style.display = "none";

        try {
            const response = await fetch("/worldcup/message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message }),
            });
            const data = await response.json();

            if (data.error) {
                errorBox.textContent = data.error;
                errorBox.style.display = "block";
            } else {
                addMessage("assistant", data.reply);
            }
        } catch (err) {
            errorBox.textContent = "Network error. Please try again.";
            errorBox.style.display = "block";
        } finally {
            sendBtn.disabled = false;
        }
    });
</script>
{% endblock %}
