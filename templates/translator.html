{% extends "base.html" %}
{% block title %}Translator Agent{% endblock %}
{% block content %}
<h1>Translator Agent</h1>
<p>Enter text and a target language, and the agent will translate it.</p>

<form method="POST" class="agent-form">
    <label for="text">Text to translate</label>
    <textarea id="text" name="text" rows="4" required>{{ request.form.get('text', '') }}</textarea>

    <label for="target_language">Target language</label>
    <input type="text" id="target_language" name="target_language" placeholder="e.g. French" value="{{ request.form.get('target_language', '') }}" required>

    <button type="submit">Translate</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if result %}
<div class="result">
    <h3>Result</h3>
    <p>{{ result }}</p>
</div>
{% endif %}
{% endblock %}
